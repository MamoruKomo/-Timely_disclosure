name: TDnet Slack alert

on:
  workflow_dispatch:
    inputs:
      test_message:
        description: "Optional Slack test message. Leave blank for normal TDnet polling."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: tdnet-slack-alert
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll TDnet and notify Slack
        env:
          SLACK_CHANNEL_ID: C0ASFHVU94L
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TDNET_TEST_MESSAGE: ${{ inputs.test_message }}
        run: |
          python3 scripts/tdnet_slack_alert.py --state data/tdnet_state.json

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tdnet_state.json
          git diff --cached --quiet || git commit -m "Update TDnet alert state"
          git push
